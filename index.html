<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Manager</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 16px;
    background: #f5f5f5;
  }

  /* ---------------- Splash ---------------- */
  .splash {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 24px;
  }

  .splash svg {
    width: 64px;
    height: 64px;
    stroke: #4F46E5;
    margin-bottom: 12px;
  }

  /* ---------------- Main Screen Folders ---------------- */
  .folder-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .folder-card {
    background: white;
    padding: 12px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  /* ---------------- Settings ---------------- */
  .settings-btn {
    background: none;
    border: 1px solid #ddd;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }

  /* ---------------- Move File Icon ---------------- */
  .move-icon {
    width: 24px;
    height: 24px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.6;
  }

  /* ---------------- Review Screen ---------------- */
  .review-card {
    background: white;
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 24px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .review-thumb {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 16px;
  }

  .review-actions {
    display: flex;
    gap: 12px;
  }

  .review-actions button {
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    cursor: pointer;
  }

  /* ---------------- Enhance Screen ---------------- */
  .rename-container {
    margin-bottom: 16px;
  }

  .rename-label {
    display: block;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .rename-input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 16px;
  }
</style>
</head>
<body>

  <!-- Splash -->
  <div class="splash">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <h1>Welcome to DocManager</h1>
    <button class="settings-btn">Settings</button>
  </div>

  <!-- Main Folder Grid -->
  <div class="folder-grid">
    <div class="folder-card">
      <span>📁</span>
      <span>Projects</span>
    </div>
    <div class="folder-card">
      <span>📁</span>
      <span>Invoices</span>
    </div>
    <div class="folder-card">
      <span>📁</span>
      <span>Reports</span>
    </div>
    <div class="folder-card">
      <span>📁</span>
      <span>Personal</span>
    </div>
  </div>

  <!-- Review Screen -->
  <div class="review-card">
    <img src="https://via.placeholder.com/400x200" alt="Thumbnail" class="review-thumb">
    <div class="review-actions">
      <button>Edit</button>
      <button>Delete</button>
      <button>
        <svg class="move-icon" viewBox="0 0 24 24">
          <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/>
          <path d="M14 12h6"/>
          <path d="M17 9l3 3-3 3"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Enhance Screen -->
  <div class="rename-container">
    <label class="rename-label" for="doc-name">Document Name</label>
    <input id="doc-name" class="rename-input" type="text" value="Scan_001">
  </div>

</body>
</html>
